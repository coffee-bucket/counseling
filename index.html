<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>🎓 수시·정시 상담 관리</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{--primary:#5b6cf8;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--gray-50:#f8fafc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;--gray-300:#cbd5e1;--gray-400:#94a3b8;--gray-500:#64748b;--gray-600:#475569;--gray-700:#334155;--gray-800:#1e293b;--gray-900:#0f172a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--gray-50);color:var(--gray-800);font-family:'Malgun Gothic','맑은 고딕',system-ui,sans-serif;font-size:13px;}
input,select,textarea{border:1px solid var(--gray-300);border-radius:5px;padding:5px 8px;font-size:12px;outline:none;transition:border-color .15s;font-family:inherit;background:white;color:var(--gray-800);}
input:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(91,108,248,.12);}
input[type="checkbox"]{width:14px;height:14px;accent-color:var(--primary);}
button{cursor:pointer;border:none;border-radius:5px;font-family:inherit;font-size:12px;transition:all .15s;}
button:hover{opacity:.88;} button:disabled{opacity:.5;cursor:not-allowed;}
::-webkit-scrollbar{width:6px;} ::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:99px;}
input,select,textarea{-webkit-appearance:none;-webkit-border-radius:5px;}
/* iOS 자동 확대 방지: 모달 내 input은 16px 이상 */
.modal input,.modal select,.modal textarea{font-size:16px !important;}
button{-webkit-appearance:none;}
*{-webkit-tap-highlight-color:transparent;}

.center-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#5b6cf8,#8b5cf6);}
.card{background:white;border-radius:16px;padding:36px;box-shadow:0 25px 60px rgba(0,0,0,.18);}
.btn-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px 20px;background:white;border:2px solid var(--gray-200);border-radius:8px;font-size:14px;font-weight:600;color:var(--gray-700);}
.btn-primary{background:linear-gradient(135deg,#5b6cf8,#8b5cf6);color:white;font-weight:600;padding:11px 20px;}
.btn-success{background:var(--success);color:white;font-weight:600;padding:6px 14px;}
.btn-ghost{background:var(--gray-100);color:var(--gray-700);padding:6px 12px;}
.btn-teal{background:#0f766e;color:white;font-weight:600;padding:7px 16px;font-size:12px;}

/* Class switcher */
.cls-tabs{display:flex;gap:4px;flex-wrap:wrap;}
.cls-tab{padding:5px 12px;border-radius:6px;font-size:13px;font-weight:600;background:rgba(255,255,255,.15);color:rgba(255,255,255,.8);cursor:pointer;border:none;transition:all .15s;}
.cls-tab:hover{background:rgba(255,255,255,.25);color:white;}
.cls-tab.active{background:white;color:var(--primary);}

.header{background:linear-gradient(135deg,#5b6cf8,#8b5cf6);color:white;padding:12px 24px;}
.toolbar{background:white;border-bottom:1px solid var(--gray-200);padding:10px 24px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.student-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;padding:16px 24px;max-width:1600px;margin:0 auto;}
@media (min-width: 641px){.toolbar{padding-left:max(24px,calc((100vw - 1600px)/2 + 24px));padding-right:max(24px,calc((100vw - 1600px)/2 + 24px));}}
.student-card{background:white;border-radius:10px;padding:12px;cursor:pointer;border:1px solid var(--gray-200);box-shadow:0 1px 3px rgba(0,0,0,.04);transition:transform .12s,box-shadow .12s;position:relative;}
.student-card:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.1);}
.student-card.completed{border-color:#a7f3d0;border-width:2px;}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:700;}
.badge-green{background:#dcfce7;color:#15803d;} .badge-blue{background:#dbeafe;color:#1d4ed8;} .badge-gray{background:var(--gray-100);color:var(--gray-400);} .badge-red{background:#fee2e2;color:#dc2626;}

.detail-header{background:white;border-bottom:1px solid var(--gray-200);padding:10px 20px;position:sticky;top:0;z-index:200;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.section-box{background:white;border-radius:10px;padding:14px 16px;border:1px solid var(--gray-200);margin-bottom:10px;}
.section-title{font-weight:700;font-size:13px;color:var(--gray-700);margin-bottom:10px;}
.field-label{font-size:11px;color:var(--gray-500);font-weight:500;margin-bottom:3px;}
.mini-label{font-size:10px;color:var(--gray-400);text-align:center;margin-bottom:2px;}

.susi-entry{border:1px solid var(--gray-200);border-radius:8px;padding:10px 12px;margin-bottom:8px;}
.susi-entry.cat-4year{background:#fafbff;border-left:3px solid var(--primary);}
.susi-entry.cat-전문대{background:#f0fdf4;border-left:3px solid var(--success);}
.susi-row{display:flex;gap:6px;align-items:center;margin-bottom:6px;flex-wrap:wrap;}
.result-block{background:var(--gray-50);border-radius:6px;padding:5px 8px;display:flex;gap:4px;align-items:center;}
.gun-header{display:inline-block;font-weight:700;font-size:12px;color:#4f46e5;background:#eef2ff;border-radius:5px;padding:3px 10px;margin-bottom:6px;}
.jungsi-row{display:flex;gap:5px;align-items:center;padding:5px 6px;background:var(--gray-50);border-radius:5px;border:1px solid var(--gray-100);margin-bottom:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:1000;}
.modal{background:white;border-radius:14px;padding:28px;width:520px;max-height:90vh;overflow-y:auto;overflow-x:hidden;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.tab{padding:5px 14px;background:var(--gray-100);color:var(--gray-600);border-radius:5px;font-size:12px;}
.tab.active{background:var(--primary);color:white;font-weight:600;}
.empty-state{text-align:center;padding:60px 20px;color:var(--gray-400);}
.progress-bar{height:8px;background:var(--gray-200);border-radius:99px;overflow:hidden;margin:8px 0;}
.progress-fill{height:100%;background:var(--success);border-radius:99px;transition:width .3s;}

@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
  body{background:white!important;}
  .no-print,.detail-header,.screen-content{display:none!important;}
  .print-area{display:block!important;padding:12mm 10mm;}
  .ph{text-align:center;border-bottom:2.5px solid #1e293b;margin-bottom:8px;padding-bottom:6px;}
  .ph h2{font-size:16px;font-weight:700;margin-bottom:2px;} .ph p{font-size:11px;color:#475569;}
  table{width:100%;border-collapse:collapse;}
  th,td{border:1px solid #aaa;padding:3px 5px;font-size:10px;vertical-align:middle;}
  th{background:#e8ecff;font-weight:700;text-align:center;}
  .info-tbl td.lbl{background:#f0f4ff;font-weight:600;text-align:center;width:60px;}
  .grade-tbl td{text-align:center;} .grade-val{font-weight:700;font-size:13px;color:#2563eb;}
  .sec-title{font-size:12px;font-weight:700;margin:9px 0 4px;padding:3px 8px;background:#e8ecff;border-left:4px solid #5b6cf8;}
  .susi-tbl th{background:#f0f4ff;} .susi-tbl td.center{text-align:center;}
  .susi-tbl tr.cat-4year td{background:#fafbff;} .susi-tbl tr.cat-전문대 td{background:#f0fdf4;}
  .jungsi-tbl th{background:#eef2ff;} .jungsi-tbl td{text-align:center;}
  .gun-cell{font-weight:700;color:#4f46e5;background:#eef2ff;}
  .diff-상향{color:#991b1b;font-weight:700;} .diff-소신{color:#854d0e;font-weight:700;}
  .diff-적정{color:#1d4ed8;font-weight:700;} .diff-안정{color:#15803d;font-weight:700;} .diff-하향{color:#6b21a8;font-weight:700;}
  .print-footer{margin-top:10px;font-size:9px;color:#888;text-align:right;border-top:1px solid #ddd;padding-top:4px;}
}
.print-area{display:none;}
/* ══════════════════════════════════
   📱 MOBILE RESPONSIVE STYLES
   ══════════════════════════════════ */
@media (max-width: 640px) {

  /* 헤더 */
  .header { padding: 10px 14px !important; }
  .cls-tabs { gap: 3px; }
  .cls-tab { padding: 4px 9px; font-size: 12px; }

  /* 툴바 */
  .toolbar { padding: 8px 12px; gap: 6px; }

  /* 학생 그리드 - 2열 */
  .student-grid {
    grid-template-columns: repeat(2, 1fr) !important;
    gap: 8px;
    padding: 12px;
  }
  .student-card { padding: 10px; }

  /* 학생 상세 헤더 */
  .detail-header {
    padding: 8px 12px !important;
    flex-wrap: wrap;
    gap: 6px;
  }

  /* 섹션 박스 */
  .section-box { padding: 10px 12px; }

  /* 수시 행 */
  .susi-row { gap: 4px; }
  .susi-entry { padding: 8px 10px; }

  /* 정시 행 - 모바일에서 overflow scroll */
  .jungsi-row {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    min-width: 0;
    flex-wrap: nowrap !important;
  }

  /* 모달 */
  .modal {
    width: calc(100vw - 24px) !important;
    max-width: 100% !important;
    margin: 12px;
    padding: 20px 16px !important;
    max-height: 88vh !important;
  }
  .modal-bg { align-items: flex-end; padding-bottom: env(safe-area-inset-bottom); }

  /* 중앙 화면 카드 */
  .card { padding: 24px 20px; margin: 16px; }
  .center-screen { align-items: flex-start; padding-top: 40px; }

  /* 클래스 선택 그리드 */
  .class-grid { grid-template-columns: repeat(3, 1fr) !important; gap: 8px; }
  .class-btn { padding: 14px 6px; font-size: 16px; }

  /* progress bar */
  .progress-bar { display: none; }
}

</style>
</head>

    <div style={{marginBottom:12}}><div className="field-label">학번</div><input value={sNum} onChange={e=>setSNum(e.target.value)} placeholder="학번" style={{width:'100%',fontSize:14,padding:'10px 12px'}} onKeyDown={e=>e.key==='Enter'&&studentLogin()}/></div>

  const reset=async()=>{setResetting(true);const pw=genPw();
    try{
      const secApp=firebase.initializeApp(FB_CONFIG,'rst_'+Date.now());
      const secAuth=secApp.auth();
      await secAuth.signInWithEmailAndPassword(sEmail(student.studentNumber,projectId),acct?.password||'');

        <div style={{fontSize:16,fontWeight:700,fontFamily:'monospace'}}>{acct.studentNumber}</div>
      </div>
      <div style={{background:'#f0f9ff',borderRadius:8,padding:14,marginBottom:12}}>
        <div style={{fontSize:11,color:'var(--gray-500)',marginBottom:3}}>현재 비밀번호</div>

        <button onClick={onClose} className="btn-ghost" style={{padding:'10px 14px'}}>닫기</button>
      </div>
    </>)}
  </div></div>);}

function PasswordChangeModal({user,onClose}){
  const [currentPw,setCurrentPw]=useState('');const [newPw,setNewPw]=useState('');const [confirmPw,setConfirmPw]=useState('');
  const [saving,setSaving]=useState(false);const [err,setErr]=useState('');const [done,setDone]=useState(false);
  const email=user.email||'';
  const idMatch=email.match(/^[st](\d+)@/);
  const isTeacher=email.startsWith('t');
  const submit=async()=>{
    setErr('');setDone(false);
    if(!currentPw||!newPw||!confirmPw){setErr('현재 비밀번호와 새 비밀번호를 모두 입력하세요.');return;}
    if(newPw.length<6){setErr('새 비밀번호는 6자 이상이어야 합니다.');return;}
    if(newPw!==confirmPw){setErr('새 비밀번호 확인이 일치하지 않습니다.');return;}
    setSaving(true);
    try{
      const credential=firebase.auth.EmailAuthProvider.credential(email,currentPw);
      await user.reauthenticateWithCredential(credential);
      await user.updatePassword(newPw);
      if(idMatch){
        const collection=isTeacher?'teachers':'studentAccounts';
        await db.collection(collection).doc(idMatch[1]).set({password:newPw,passwordChangedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
      }
      setDone(true);setCurrentPw('');setNewPw('');setConfirmPw('');
    }catch(e){
      if(e.code==='auth/wrong-password'||e.code==='auth/invalid-credential')setErr('현재 비밀번호가 올바르지 않습니다.');
      else if(e.code==='auth/weak-password')setErr('새 비밀번호가 너무 약합니다. 6자 이상으로 입력하세요.');
      else setErr('비밀번호 변경 실패: '+e.message);
    }finally{setSaving(false);}
  };
  return(<div className="modal-bg" onClick={onClose}><div className="modal" style={{width:'min(380px, calc(100vw - 24px))'}} onClick={e=>e.stopPropagation()}>
    <h3 style={{fontSize:16,fontWeight:700,marginBottom:4}}>비밀번호 변경</h3>
    <p style={{color:'var(--gray-500)',fontSize:13,marginBottom:16}}>현재 비밀번호 확인 후 새 비밀번호로 변경합니다.</p>
    <div style={{display:'grid',gap:10,marginBottom:12}}>
      <div><div className="field-label">현재 비밀번호</div><input type="password" value={currentPw} onChange={e=>setCurrentPw(e.target.value)} style={{width:'100%',fontSize:16,padding:'10px 12px'}}/></div>
      <div><div className="field-label">새 비밀번호</div><input type="password" value={newPw} onChange={e=>setNewPw(e.target.value)} placeholder="6자 이상 입력하세요" style={{width:'100%',fontSize:16,padding:'10px 12px'}}/><div style={{fontSize:11,color:'var(--gray-400)',marginTop:4}}>6자 이상 입력하세요</div></div>
      <div><div className="field-label">새 비밀번호 확인</div><input type="password" value={confirmPw} onChange={e=>setConfirmPw(e.target.value)} placeholder="새 비밀번호를 다시 입력하세요" style={{width:'100%',fontSize:16,padding:'10px 12px'}} onKeyDown={e=>e.key==='Enter'&&submit()}/></div>
    </div>
    {err&&<p style={{color:'var(--danger)',fontSize:12,marginBottom:10}}>{err}</p>}
    {done&&<p style={{color:'var(--success)',fontSize:12,fontWeight:700,marginBottom:10}}>비밀번호가 변경되었습니다.</p>}
    <div style={{display:'flex',gap:8}}>
      <button onClick={submit} disabled={saving} style={{flex:1,padding:'11px',background:'var(--primary)',color:'white',fontWeight:700,fontSize:13,borderRadius:7}}>{saving?'변경 중...':'비밀번호 변경'}</button>
      <button onClick={onClose} className="btn-ghost" style={{padding:'11px 14px'}}>닫기</button>
    </div>
  </div></div>);
}

/* ── Bulk Account Modal ── */
function BulkAccountModal({students,cls,grade,projectId,onClose}){
  const [phase,setPhase]=useState('ready');const [progress,setProgress]=useState(0);const [results,setResults]=useState([]);const [errors,setErrors]=useState([]);
  const sleep=ms=>new Promise(r=>setTimeout(r,ms));
  const run=async()=>{
    setPhase('running');const newResults=[];const newErrors=[];
    const toCreate=students.filter(s=>!s.authUid&&s.studentNumber);
    for(let i=0;i<toCreate.length;i++){
      const s=toCreate[i];const pw=genPw();const email=sEmail(s.studentNumber,projectId);
      let retries=3;
      while(retries>0){
        try{
          const secApp=firebase.initializeApp(FB_CONFIG,'sec_'+Date.now());const secAuth=secApp.auth();
          const cred=await secAuth.createUserWithEmailAndPassword(email,pw);const authUid=cred.user.uid;
          await secAuth.signOut();try{await secApp.delete();}catch(e){}
          await db.collection('studentAccounts').doc(s.studentNumber).set({uid:authUid,studentNumber:s.studentNumber,name:s.name,grade,cls,password:pw,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
          await clsRef(cls,grade).collection('students').doc(s.studentNumber).update({authUid});
          newResults.push({...s,pw,authUid});retries=0;
        }catch(e){
          if(e.code==='auth/email-already-in-use'){
            await clsRef(cls,grade).collection('students').doc(s.studentNumber).update({authUid:'exists'});
            newResults.push({...s,pw:'(기존계정)',authUid:'exists'});retries=0;
          }
          else if(e.code==='auth/too-many-requests'){
            retries--;
            const waitSec=retries===2?10:retries===1?30:0;
            if(retries>0){await sleep(waitSec*1000);}
            else newErrors.push({name:s.name,studentNumber:s.studentNumber,err:`rate limit - ${waitSec}초 대기 후 재시도했으나 실패`});
          }else{newErrors.push({name:s.name,studentNumber:s.studentNumber,err:e.message});retries=0;}
        }
      }
      setProgress(Math.round((i+1)/toCreate.length*100));
      if(i<toCreate.length-1)await sleep(1200);
    }
    setResults(newResults);setErrors(newErrors);setPhase('done');};

  const printNew=()=>openPrintWindow(results.filter(r=>r.pw&&r.pw!=='(기존계정)'),cls);

  return(<div className="modal-bg"><div className="modal" style={{width:'min(520px, calc(100vw - 24px))'}}>\n    <h3 style={{fontSize:16,fontWeight:700,marginBottom:4}}>🔑 전체 계정 일괄 생성</h3>
    <p style={{color:'var(--gray-500)',fontSize:13,marginBottom:16}}>{gradeLabel(grade)} {cls}반 · 계정 없는 학생 {students.filter(s=>!s.authUid).length}명</p>
    {phase==='ready'&&(<><div style={{background:'#fef9c3',border:'1px solid #fde68a',borderRadius:8,padding:14,marginBottom:16,fontSize:12,color:'#854d0e',lineHeight:1.8}}>
      ⚠ 계정마다 1.2초 간격으로 생성됩니다. 창을 닫지 마세요.<br/>완료 후 인쇄 버튼으로 계정 카드를 출력할 수 있습니다.
    </div>
    <div style={{display:'flex',gap:8}}><button onClick={run} style={{flex:1,padding:'12px',background:'linear-gradient(135deg,#5b6cf8,#8b5cf6)',color:'white',fontWeight:700,fontSize:14,borderRadius:8}}>✨ 계정 생성 시작</button><button onClick={onClose} className="btn-ghost" style={{padding:'12px 16px'}}>취소</button></div></>)}
    {phase==='running'&&(<div style={{textAlign:'center',padding:'20px 0'}}>
      <div style={{fontSize:32,marginBottom:8}}>⏳</div>
      <p style={{fontSize:14,fontWeight:600,marginBottom:12}}>계정 생성 중... {progress}%</p>
      <div className="progress-bar"><div className="progress-fill" style={{width:`${progress}%`}}/></div>
      <p style={{fontSize:12,color:'var(--gray-400)',marginTop:8}}>예상 소요시간: 약 {Math.ceil(students.filter(s=>!s.authUid).length*1.2/60)}분 · 창을 닫지 마세요.</p>
    </div>)}
    {phase==='done'&&(<>
      <div style={{background:'#f0fdf4',border:'1px solid #a7f3d0',borderRadius:8,padding:14,marginBottom:12}}>

function TeacherAccountModal({grade,projectId,onClose}){
  const [phase,setPhase]=useState('ready');const [progress,setProgress]=useState(0);const [results,setResults]=useState([]);const [errors,setErrors]=useState([]);
  const seeds=teacherSeeds(grade);
  const sleep=ms=>new Promise(r=>setTimeout(r,ms));
  const run=async()=>{
    setPhase('running');setProgress(0);const made=[];const errs=[];
    for(let i=0;i<seeds.length;i++){
      const t=seeds[i];const pw=genPw();const email=tEmail(t.teacherNumber,projectId);
      try{
        const existing=await db.collection('teachers').doc(t.teacherNumber).get();
        if(existing.exists){
          await db.collection('teachers').doc(t.teacherNumber).set({...t,email,password:existing.data().password||''},{merge:true});
          made.push({...t,email,password:existing.data().password||'(기존 비밀번호 확인 필요)',existing:true});
        }else{
          const secApp=firebase.initializeApp(FB_CONFIG,'tsec_'+Date.now());const secAuth=secApp.auth();
          const cred=await secAuth.createUserWithEmailAndPassword(email,pw);const authUid=cred.user.uid;
          await secAuth.signOut();try{await secApp.delete();}catch(e){}
          await db.collection('teachers').doc(t.teacherNumber).set({...t,uid:authUid,email,password:pw,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
          made.push({...t,email,password:pw,uid:authUid});
        }
      }catch(e){
        if(e.code==='auth/email-already-in-use')errs.push({...t,err:'이미 Auth 계정이 있습니다. Firestore teachers 문서가 없으면 수동 연결이 필요합니다.'});
        else errs.push({...t,err:e.message});
      }
      setProgress(Math.round((i+1)/seeds.length*100));
      if(i<seeds.length-1)await sleep(1200);
    }
    setResults(made);setErrors(errs);setPhase('done');
  };
  const print=()=>{
    const rows=results.map(r=>`<tr><td>${r.cls}반</td><td>${r.teacherNumber}</td><td>${r.name}</td><td>${r.role==='admin'?'관리자':'담임'}</td><td>${r.password||''}</td></tr>`).join('');
    const w=window.open('','_blank','width=900,height=700');
    if(!w)return alert('팝업 차단을 해제해 주세요.');
    w.document.write(`<html><head><title>선생님 계정표</title><style>body{font-family:Malgun Gothic,sans-serif;padding:24px}table{border-collapse:collapse;width:100%}th,td{border:1px solid #999;padding:8px;text-align:center}th{background:#eef2ff}</style></head><body><h2>선생님 계정표</h2><table><thead><tr><th>반</th><th>번호</th><th>이름</th><th>권한</th><th>비밀번호</th></tr></thead><tbody>${rows}</tbody></table><scr"+"ipt>window.onload=()=>window.print()<\/script></body></html>`);
    w.document.close();
  };
  return(<div className="modal-bg" onClick={onClose}><div className="modal" style={{width:'min(620px, calc(100vw - 24px))',maxHeight:'88vh'}} onClick={e=>e.stopPropagation()}>
    <h3 style={{fontSize:16,fontWeight:700,marginBottom:4}}>선생님 계정 생성</h3>
    <p style={{color:'var(--gray-500)',fontSize:13,marginBottom:16}}>{gradeLabel(grade)} 1~9반 담임 계정을 생성합니다.</p>
    {phase==='ready'&&(<>
      <div style={{background:'#f8fafc',border:'1px solid var(--gray-200)',borderRadius:8,padding:12,marginBottom:14,fontSize:12,lineHeight:1.7}}>
        {seeds.map(t=><div key={t.teacherNumber} style={{display:'flex',justifyContent:'space-between',gap:10}}><span>{t.teacherNumber} · {t.name}</span><strong style={{color:t.role==='admin'?'#dc2626':'#2563eb'}}>{t.role==='admin'?'관리자':'담임'}</strong></div>)}
      </div>
      <div style={{display:'flex',gap:8}}><button onClick={run} style={{flex:1,padding:'12px',background:'linear-gradient(135deg,#5b6cf8,#8b5cf6)',color:'white',fontWeight:700,fontSize:14,borderRadius:8}}>1~9반 선생님 계정 생성</button><button onClick={onClose} className="btn-ghost" style={{padding:'12px 16px'}}>취소</button></div>
    </>)}
    {phase==='running'&&(<div style={{textAlign:'center',padding:'20px 0'}}><p style={{fontSize:14,fontWeight:700,marginBottom:12}}>계정 생성 중... {progress}%</p><div className="progress-bar"><div className="progress-fill" style={{width:`${progress}%`}}/></div></div>)}
    {phase==='done'&&(<>
      <div style={{background:'#f0fdf4',border:'1px solid #a7f3d0',borderRadius:8,padding:12,marginBottom:12}}><strong style={{color:'#15803d'}}>완료: {results.length}개 처리</strong>{errors.length>0&&<span style={{color:'var(--danger)',marginLeft:8}}>오류 {errors.length}개</span>}</div>
      <div style={{maxHeight:230,overflowY:'auto',border:'1px solid var(--gray-200)',borderRadius:8,marginBottom:12}}>
        {results.map(r=><div key={r.teacherNumber} style={{display:'grid',gridTemplateColumns:'70px 1fr 80px 120px',gap:8,padding:'8px 10px',borderBottom:'1px solid var(--gray-100)',alignItems:'center',fontSize:12}}>
          <strong>{r.teacherNumber}</strong><span>{r.name}</span><span style={{color:r.role==='admin'?'#dc2626':'#2563eb',fontWeight:700}}>{r.role==='admin'?'관리자':'담임'}</span><code style={{fontSize:13,fontWeight:700}}>{r.password}</code>
        </div>)}
      </div>
      {errors.length>0&&<div style={{background:'#fef2f2',borderRadius:8,padding:10,marginBottom:12,fontSize:11,color:'#991b1b'}}>{errors.map(e=><div key={e.teacherNumber}>{e.teacherNumber}: {e.err}</div>)}</div>}
      <div style={{display:'flex',gap:8}}><button onClick={print} disabled={results.length===0} style={{flex:1,padding:'12px',background:'#0f766e',color:'white',fontWeight:700,fontSize:14,borderRadius:8}}>계정표 인쇄</button><button onClick={onClose} className="btn-ghost" style={{padding:'12px 16px'}}>닫기</button></div>
    </>)}
  </div></div>);
}

    setRecordSaving(true);

  const btnCfg={idle:{label:'💾 저장',bg:'#3b82f6'},saving:{label:'저장 중...',bg:'#94a3b8'},saved:{label:'✓ 저장 완료',bg:'#10b981'},error:{label:'⚠ 실패',bg:'#ef4444'}}[status];

      <div style={{marginLeft:'auto',display:'flex',gap:8}}>

      {!isTeacher&&<div style={{background:'#fef2f2',border:'1px solid #fecaca',borderRadius:8,padding:'10px 14px',marginBottom:10,fontSize:11,color:'#991b1b',lineHeight:1.7}}>

        <div><div className="field-label">번호</div><input value={data.no||''} readOnly style={{width:50,background:'var(--gray-50)'}}/></div>
        <div><div className="field-label">학번</div><input value={data.studentNumber||''} readOnly style={{width:90,background:'var(--gray-50)'}}/></div>
        <div><div className="field-label">이름</div><input value={data.name||''} readOnly style={{width:90,background:'var(--gray-50)'}}/></div>

      </div>
      {isTeacher&&<div className="section-box">
        <div className="section-title">상담 누적 기록</div>
        <div style={{display:'grid',gridTemplateColumns:'140px 80px 80px 1fr auto',gap:8,alignItems:'end',marginBottom:10}}>
          <div><div className="field-label">상담일자</div><input value={counselSlot?.date||data.counselingDate||''} readOnly style={{width:'100%',background:'var(--gray-50)'}}/></div>
          <div><div className="field-label">회차</div><input value={`${counselReq?.round||data.counselingRound||1}회차`} readOnly style={{width:'100%',background:'var(--gray-50)',textAlign:'center',fontWeight:700}}/></div>
          <div><div className="field-label">교시</div><select value={recordPeriod} onChange={e=>setRecordPeriod(e.target.value)} style={{width:'100%'}}>
            <option value="">-</option>
            {[1,2,3,4,5,6,7].map(n=><option key={n} value={`${n}교시`}>{n}교시</option>)}
          </select></div>
          <div style={{gridColumn:'1 / -1'}}><div className="field-label">상담 내용</div><textarea value={recordText} onChange={e=>setRecordText(e.target.value)} placeholder="상담 내용을 입력하세요 (줄바꿈 가능)" rows={3} style={{width:'100%',resize:'vertical',lineHeight:1.6,padding:'6px 8px',border:'1px solid var(--gray-300)',borderRadius:5,fontFamily:'inherit',fontSize:12}}/></div>
          <button onClick={saveCounselRecord} disabled={recordSaving} style={{background:'var(--primary)',color:'white',fontWeight:700,padding:'7px 14px',borderRadius:6,gridColumn:'1 / -1'}}>{recordSaving?'저장 중...':'💾 상담 내용 저장'}</button>
        </div>
        {(data.counselingRecords||[]).length===0?<div style={{fontSize:12,color:'var(--gray-400)',textAlign:'center',padding:'12px',background:'var(--gray-50)',borderRadius:6}}>저장된 상담 기록이 없습니다</div>:
          <div style={{display:'grid',gap:6}}>{(data.counselingRecords||[]).map(r=><div key={r.id} style={{display:'grid',gridTemplateColumns:'110px 56px 56px 1fr auto',gap:8,alignItems:'start',padding:'7px 9px',background:'var(--gray-50)',border:'1px solid var(--gray-100)',borderRadius:6}}>
            <span style={{fontWeight:700,color:'var(--gray-600)',paddingTop:2}}>{r.date||'-'}</span>
            <span className="badge badge-blue" style={{alignSelf:'start',marginTop:2}}>{r.round||1}회차</span>
            {r.period&&<span className="badge" style={{alignSelf:'start',marginTop:2,background:'#fef9c3',color:'#854d0e'}}>{r.period}</span>}
            <span style={{color:'var(--gray-700)',whiteSpace:'pre-wrap',wordBreak:'break-all'}}>{r.content}</span>
            <button onClick={()=>{if(window.confirm('이 상담 기록을 삭제하시겠습니까?')){const updated=(data.counselingRecords||[]).filter(x=>x.id!==r.id);update('counselingRecords',updated);}}} style={{background:'none',color:'var(--gray-300)',fontSize:14,padding:'2px 4px',alignSelf:'start'}} onMouseEnter={e=>e.target.style.color='var(--danger)'} onMouseLeave={e=>e.target.style.color='var(--gray-300)'}>🗑</button>

      <GradeSection grades={data.grades} onChange={g=>setData(d=>({...d,grades:g}))}/>
      <div className="section-box">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>

/* ── Schedule Modal (Teacher) ── */
function ScheduleModal({cls,grade,onClose}){
  const DEFAULT_LOCATION='상담실';
  const [slots,setSlots]=useState([]);
  const [requests,setRequests]=useState({});
  const [date,setDate]=useState('');const [period,setPeriod]=useState('');const [location,setLocation]=useState(DEFAULT_LOCATION);
  const [adding,setAdding]=useState(false);const [tab,setTab]=useState('slots');
  const [modalPos,setModalPos]=useState(null);
  const dragRef=useRef(null);
  const sortSlots=list=>list.sort((a,b)=>`${a.date||''} ${a.startTime||''}`.localeCompare(`${b.date||''} ${b.startTime||''}`));
  const refreshSlots=async()=>{
    const snap=await clsRef(cls,grade).collection('slots').get();
    setSlots(sortSlots(snap.docs.map(d=>({id:d.id,...d.data()}))));
  };

  useEffect(()=>{
    const unsub=clsRef(cls,grade).collection('slots')
      .onSnapshot(snap=>setSlots(sortSlots(snap.docs.map(d=>({id:d.id,...d.data()})))),err=>{console.error(err);alert('상담 일정 불러오기 실패: '+(err.message||err));});
    const unsub2=clsRef(cls,grade).collection('requests')
      .onSnapshot(snap=>{const m={};snap.docs.forEach(d=>m[d.id]=d.data());setRequests(m);},err=>{console.error(err);alert('상담 신청 불러오기 실패: '+(err.message||err));});
    return()=>{unsub();unsub2();};
  },[cls]);

  useEffect(()=>{
    const move=e=>{
      if(!dragRef.current)return;
      const {dx,dy,w,h}=dragRef.current;
      const x=Math.max(12,Math.min(window.innerWidth-w-12,e.clientX-dx));
      const y=Math.max(12,Math.min(window.innerHeight-h-12,e.clientY-dy));
      setModalPos({x,y});
    };
    const up=()=>{dragRef.current=null;};
    window.addEventListener('mousemove',move);
    window.addEventListener('mouseup',up);
    return()=>{window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up);};
  },[]);

  const startDrag=e=>{
    if(e.button!==0)return;
    if(e.target.closest('input,select,textarea,button,.tab'))return;
    const rect=e.currentTarget.closest('.modal').getBoundingClientRect();
    dragRef.current={dx:e.clientX-rect.left,dy:e.clientY-rect.top,w:rect.width,h:rect.height};
    setModalPos({x:rect.left,y:rect.top});
  };

  const addSlot=async()=>{
    if(!date||!period){alert('날짜와 교시를 모두 선택하세요');return;}
    setAdding(true);
    try{
      const placeText=(location||DEFAULT_LOCATION).trim();
      const slotData={
        date,
        startTime:`${String(period).padStart(2,'0')}교시`,
        endTime:'',
        note:placeText,
        confirmedFor:'',
        createdAt:firebase.firestore.FieldValue.serverTimestamp()
      };
      const docRef=await clsRef(cls,grade).collection('slots').add(slotData);
      setSlots(prev=>sortSlots([...prev,{...slotData,id:docRef.id,createdAt:null}]));
      await refreshSlots();
      setTab('slots');
      setPeriod('');setLocation(DEFAULT_LOCATION);
    }catch(e){
      console.error(e);alert('상담 일정 추가 실패: '+(e.message||e));
    }finally{setAdding(false);}
  };

  const deleteSlot=async id=>{
    if(!window.confirm('삭제하시겠습니까?'))return;
    try{
      const batch=db.batch();
      batch.delete(clsRef(cls,grade).collection('slots').doc(id));
      Object.entries(requests).forEach(([studentNum,req])=>{
        const requested=(req.requestedSlots||[]).filter(sid=>sid!==id);
        const patch={updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
        if((req.requestedSlots||[]).includes(id))patch.requestedSlots=requested;
        if(req.confirmedSlotId===id){patch.confirmedSlotId='';patch.status=requested.length>0?'pending':'completed';}
        if(req.lastCompletedSlotId===id)patch.lastCompletedSlotId='';
        if(Object.keys(patch).length>1)batch.set(clsRef(cls,grade).collection('requests').doc(studentNum),patch,{merge:true});
      });
      await batch.commit();
      setSlots(prev=>prev.filter(s=>s.id!==id));
      setRequests(prev=>{
        const next={...prev};
        Object.entries(next).forEach(([studentNum,req])=>{
          const requested=(req.requestedSlots||[]).filter(sid=>sid!==id);
          if((req.requestedSlots||[]).includes(id)||req.confirmedSlotId===id||req.lastCompletedSlotId===id){
            next[studentNum]={...req,requestedSlots:requested,confirmedSlotId:req.confirmedSlotId===id?'':req.confirmedSlotId,lastCompletedSlotId:req.lastCompletedSlotId===id?'':req.lastCompletedSlotId};
          }
        });
        return next;
      });
    }
    catch(e){console.error(e);alert('상담 일정 삭제 실패: '+(e.message||e));}
  };

  const confirmSlot=async(slotId,studentNum)=>{
    try{
      const req=requests[studentNum]||{};
      const batch=db.batch();
      batch.update(clsRef(cls,grade).collection('slots').doc(slotId),{confirmedFor:studentNum});
      batch.set(clsRef(cls,grade).collection('requests').doc(studentNum),{...req,studentNumber:studentNum,round:req.round||1,confirmedSlotId:slotId,status:'confirmed',confirmedAt:firebase.firestore.FieldValue.serverTimestamp(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
      await batch.commit();
    }catch(e){console.error(e);alert('상담 일정 확정 실패: '+(e.message||e));}
  };

  const completeSlot=async(slotId,studentNum)=>{
    if(!window.confirm('이 상담을 완료 처리하고 학생이 다음 회차를 신청할 수 있게 할까요?'))return;
    try{
      const req=requests[studentNum]||{};const round=req.round||1;
      const batch=db.batch();
      batch.update(clsRef(cls,grade).collection('slots').doc(slotId),{confirmedFor:'',completedFor:studentNum,completedRound:round,completedAt:firebase.firestore.FieldValue.serverTimestamp()});
      batch.set(clsRef(cls,grade).collection('requests').doc(studentNum),{...req,status:'completed',confirmedSlotId:'',requestedSlots:[],lastCompletedSlotId:slotId,lastCompletedRound:round,round:round+1,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
      await batch.commit();
    }catch(e){console.error(e);alert('상담 완료 처리 실패: '+(e.message||e));}
  };

  const unconfirm=async(slotId,studentNum)=>{
    try{
      const batch=db.batch();
      batch.update(clsRef(cls,grade).collection('slots').doc(slotId),{confirmedFor:''});
      batch.set(clsRef(cls,grade).collection('requests').doc(studentNum),{confirmedSlotId:'',status:'pending',updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
      await batch.commit();
    }catch(e){console.error(e);alert('상담 일정 확정 취소 실패: '+(e.message||e));}
  };

  // Group slots by date
  const byDate={};slots.forEach(s=>{if(!byDate[s.date])byDate[s.date]=[];byDate[s.date].push(s);});
  const confirmed=slots.filter(s=>s.confirmedFor&&requests[s.confirmedFor]?.status==='confirmed');
  const pending=Object.entries(requests).filter(([k,v])=>v.status!=='confirmed'&&v.requestedSlots?.length>0);
  const roundRows=Object.entries(requests).sort(([a],[b])=>a.localeCompare(b));

  const dayLabel=d=>{const days=['일','월','화','수','목','금','토'];const dt=new Date(d);return `${d} (${days[dt.getDay()]})`;};
  const periodTimes={0:'08:00~08:50',8:'17:00~17:50',9:'18:00~18:50',10:'19:00~19:50',11:'20:00~20:50',12:'21:00~21:50'};
  const periodNum=s=>s.period!==undefined&&s.period!==''?Number(s.period):s.startTime?.match(/^\d{2}교시$/)?Number(s.startTime.slice(0,2)):null;
  const periodLabel=n=>periodTimes[n]?`${n}교시 (${periodTimes[n]})`:`${n}교시`;
  const slotLabel=s=>{const n=periodNum(s);return n!==null?periodLabel(n):`${s.startTime||''}${s.endTime?`~${s.endTime}`:''}`;};
  const place=s=>s.location||s.note||'';
  const studentLabel=(sNum,roundOverride)=>{const req=requests[sNum]||{};const round=roundOverride||req.round||1;return `${sNum}${req.name?` ${req.name}`:''} ${round}회차`;}
  const studentStatusLabel=(sNum,status,roundOverride)=>`${studentLabel(sNum,roundOverride)} ${status}`;
  const modalStyle={width:775,maxWidth:'calc(100vw - 24px)',maxHeight:'92vh',position:'fixed',left:modalPos?modalPos.x:'50%',top:modalPos?modalPos.y:'50%',transform:modalPos?'none':'translate(-50%,-50%)',padding:35};

  return(<div className="modal-bg" onClick={onClose}><div className="modal" style={modalStyle} onMouseDown={startDrag} onClick={e=>e.stopPropagation()}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,cursor:'move',userSelect:'none'}}>
      <h3 style={{fontSize:16,fontWeight:700}}>📅 상담 일정 관리 — {gradeLabel(grade)} {cls}반</h3>
      <button onMouseDown={e=>e.stopPropagation()} onClick={onClose} style={{background:'none',fontSize:20,color:'var(--gray-400)',cursor:'pointer'}}>✕</button>
    </div>

    {/* 슬롯 추가 */}
    <div style={{background:'var(--gray-50)',borderRadius:8,padding:12,marginBottom:14,display:'flex',gap:8,alignItems:'flex-end',flexWrap:'wrap'}}>

    </div>
  </div></div>);}

/* ── Schedule Section (Student) ── */
function ScheduleSection({studentNumber,studentName,cls,grade}){
  const [slots,setSlots]=useState([]);const [myReq,setMyReq]=useState(null);
  const [selected,setSelected]=useState([]);const [memo,setMemo]=useState('');const [saving,setSaving]=useState(false);
  const [collapsed,setCollapsed]=useState(false);

  useEffect(()=>{
    const sortSlots=list=>list.sort((a,b)=>`${a.date||''} ${a.startTime||''}`.localeCompare(`${b.date||''} ${b.startTime||''}`));
    const unsub=clsRef(cls,grade).collection('slots').onSnapshot(snap=>setSlots(sortSlots(snap.docs.map(d=>({id:d.id,...d.data()})))),err=>{console.error(err);alert('상담 일정 불러오기 실패: '+(err.message||err));});
    const unsub2=clsRef(cls,grade).collection('requests').doc(studentNumber).onSnapshot(doc=>{if(doc.exists){setMyReq(doc.data());setSelected(doc.data().requestedSlots||[]);setMemo(doc.data().studentNote||'');}},err=>{console.error(err);alert('내 상담 신청 불러오기 실패: '+(err.message||err));});
    return()=>{unsub();unsub2();};
  },[cls,studentNumber]);

  const toggle=id=>{if(selected.includes(id)){setSelected([]);}else{setSelected([id]);}};
  const submit=async()=>{
    if(selected.length===0){alert('신청할 일정을 선택하세요');return;}
    setSaving(true);
    try{
      const slotId=selected[0];
      const requestRef=clsRef(cls,grade).collection('requests').doc(studentNumber);
      await db.runTransaction(async tx=>{
        const requestDoc=await tx.get(requestRef);
        const prevReq=requestDoc.exists?requestDoc.data():{};
        if(prevReq.status==='confirmed'&&prevReq.confirmedSlotId&&prevReq.confirmedSlotId!==slotId){
          throw new Error('이미 확정된 일정은 변경할 수 없습니다. 선생님께 문의하세요.');
        }
        const prevSlots=(prevReq.requestedSlots||[]).filter(id=>id&&id!==slotId);
        const slotRef=clsRef(cls,grade).collection('slots').doc(slotId);
        const slotDoc=await tx.get(slotRef);
        const prevSlotDocs=await Promise.all(prevSlots.map(id=>tx.get(clsRef(cls,grade).collection('slots').doc(id))));
        if(!slotDoc.exists)throw new Error('선택한 일정이 삭제되었습니다.');
        const slotData=slotDoc.data();
        if(slotData.confirmedFor&&slotData.confirmedFor!==studentNumber)throw new Error('이미 다른 학생이 신청한 일정입니다.');
        if(slotData.completedFor)throw new Error('이미 상담이 완료된 일정입니다.');
        tx.update(slotRef,{confirmedFor:studentNumber});
        prevSlotDocs.forEach(doc=>{if(doc.exists&&doc.data().confirmedFor===studentNumber)tx.update(doc.ref,{confirmedFor:''});});
        tx.set(requestRef,{
          studentNumber,
          name:studentName,
          requestedSlots:[slotId],
          studentNote:memo,
          status:prevReq.status==='confirmed'?'confirmed':'pending',
          confirmedSlotId:prevReq.status==='confirmed'?prevReq.confirmedSlotId:'',
          round:prevReq.round||1,
          updatedAt:firebase.firestore.FieldValue.serverTimestamp()
        },{merge:true});
      });
      alert('신청 완료!');
    }catch(e){
      console.error(e);alert('상담 신청 저장 실패: '+(e.message||e));
    }finally{setSaving(false);}
  };

  const confirmedSlot=myReq?.confirmedSlotId?slots.find(s=>s.id===myReq.confirmedSlotId):null;
  const visibleSlots=slots;
  const dayLabel=d=>{const days=['일','월','화','수','목','금','토'];const dt=new Date(d);return `${d} (${days[dt.getDay()]})`};
  const periodTimes={0:'08:00~08:50',8:'17:00~17:50',9:'18:00~18:50',10:'19:00~19:50',11:'20:00~20:50',12:'21:00~21:50'};
  const periodNum=s=>s.period!==undefined&&s.period!==''?Number(s.period):s.startTime?.match(/^\d{2}교시$/)?Number(s.startTime.slice(0,2)):null;
  const periodLabel=n=>periodTimes[n]?`${n}교시 (${periodTimes[n]})`:`${n}교시`;
  const slotLabel=s=>{const n=periodNum(s);return n!==null?periodLabel(n):`${s.startTime||''}${s.endTime?`~${s.endTime}`:''}`;};
  const place=s=>s.location||s.note||'';

  const header=(<div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,marginBottom:collapsed?0:12}}>
    <div className="section-title" style={{marginBottom:0}}>📅 상담 일정 신청</div>
    <button type="button" onClick={()=>setCollapsed(v=>!v)} className="btn-ghost" style={{padding:'5px 10px',fontSize:12,fontWeight:700}}>
      {collapsed?'펼치기':'접기'}
    </button>
  </div>);

  if(slots.length===0)return(<div className="section-box">{header}{!collapsed&&<p style={{fontSize:12,color:'var(--gray-400)'}}>선생님이 아직 상담 가능 시간을 등록하지 않았습니다.</p>}</div>);

  return(<div className="section-box">
    {header}
    {!collapsed&&<>
    {confirmedSlot&&(
      <div style={{background:'#f0fdf4',border:'2px solid #a7f3d0',borderRadius:8,padding:12,marginBottom:14,display:'flex',alignItems:'center',gap:10}}>
        <span style={{fontSize:24}}>✅</span>
        <div><div style={{fontWeight:700,color:'#15803d',fontSize:14}}>상담 일정 확정!</div>
          <div style={{fontSize:13,fontWeight:600}}>{dayLabel(confirmedSlot.date)} {slotLabel(confirmedSlot)}</div>
          {place(confirmedSlot)&&<div style={{fontSize:11,color:'var(--gray-500)'}}>{place(confirmedSlot)}</div>}
        </div>
      </div>)}
    <p style={{fontSize:12,color:'var(--gray-600)',marginBottom:10}}>희망하는 상담 일정을 1개 선택하세요. 신청하면 해당 일정은 선착순 마감됩니다.</p>
    <div style={{display:'flex',flexDirection:'column',gap:5,marginBottom:12}}>
      {visibleSlots.map((s,i)=>{
        const isSel=selected.includes(s.id);const isMine=s.confirmedFor===studentNumber;const isDone=!!s.completedFor;const isDoneMine=s.completedFor===studentNumber;const isClosed=(!!s.confirmedFor&&!isMine)||isDone;const isConf=isMine&&myReq?.status==='confirmed';
        return(<div key={s.id} onClick={()=>!isMine&&!isClosed&&toggle(s.id)}
          style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',borderRadius:7,cursor:isMine||isClosed?'default':'pointer',opacity:isClosed?0.75:1,
            background:isMine?'#f0fdf4':isClosed?'#f8fafc':isSel?'#eff6ff':'var(--gray-50)',border:`1px solid ${isMine?'#a7f3d0':isClosed?'var(--gray-200)':isSel?'#93c5fd':'var(--gray-200)'}`,transition:'all .15s'}}>
          <div style={{width:22,height:22,borderRadius:'50%',border:`2px solid ${isSel||isMine?'var(--primary)':'var(--gray-300)'}`,background:isSel?'var(--primary)':isMine?'var(--success)':isClosed?'var(--gray-200)':'white',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            {isConf?<span style={{fontSize:12,color:'white'}}>✓</span>:isSel?<span style={{fontSize:11,color:'white',fontWeight:700}}>1</span>:null}
          </div>
          <div style={{flex:1}}>
            <span style={{fontWeight:600,fontSize:13}}>{slotLabel(s)}</span>
            <span style={{fontSize:14,color:'var(--gray-600)',fontWeight:700,marginLeft:10}}>{dayLabel(s.date)}</span>
            {place(s)&&<span style={{fontSize:12,color:'var(--gray-500)',fontWeight:600,marginLeft:8}}>{place(s)}</span>}
          </div>
          {isMine&&<span className={`badge ${isConf?'badge-green':'badge-blue'}`}>{isConf?'확정':'신청 완료'}</span>}
          {isDoneMine&&<span className="badge badge-gray">{s.completedRound?`${s.completedRound}회차 완료`:'상담 완료'}</span>}
          {isClosed&&!isDoneMine&&<span className="badge badge-red">마감</span>}
          {!isMine&&!isClosed&&<span className="badge badge-green">신청가능</span>}
        </div>);})}
    </div>
    <div style={{marginBottom:10}}><div className="field-label">메모 (선생님께 전달할 말)</div>
      <input value={memo} onChange={e=>setMemo(e.target.value)} placeholder="예) 제 등급으로 갈 수 있는 대학이 궁금해요" style={{width:'100%'}}/></div>
    <button onClick={submit} disabled={saving||selected.length===0} style={{width:'100%',padding:'10px',background:selected.length>0?'var(--primary)':'var(--gray-200)',color:selected.length>0?'white':'var(--gray-400)',fontWeight:700,borderRadius:7,fontSize:13}}>
      {saving?'신청 중...':'선택한 일정 신청하기'}
    </button>
    </>}
  </div>);}
function TeacherDashboard({user,onLogout,profile}){

  const [currentCls,setCurrentCls]=useState(null);
  const [students,setStudents]=useState([]);
  const [loading,setLoading]=useState(false);
  const [selected,setSelected]=useState(null);
  const [search,setSearch]=useState('');

  const [bulkModal,setBulkModal]=useState(false);
  const [acctModal,setAcctModal]=useState(null);
  const [teacherAcctModal,setTeacherAcctModal]=useState(false);
  const [pwModal,setPwModal]=useState(false);
  const [scheduleModal,setScheduleModal]=useState(false);

  const isAdminProfile=profile?.role==='admin'||profile?.isGoogleAdmin;
  const forcedGrade=!isAdminProfile?gradeFromNumber(profile?.teacherNumber||profile?.cls||profile?.grade):null;
  const accessibleGrades=isAdminProfile?[2,3]:[forcedGrade||profile?.grade||2];
  const accessibleClasses=isAdminProfile?ALL_CLASSES:(profile?.classes?.length?profile.classes:[1]);
  const teacherName=profile?.name||user.displayName||user.email||'선생님';

  useEffect(()=>{
    const cfg=localStorage.getItem('fbConfig');if(cfg){try{setProjectId(JSON.parse(cfg).projectId);}catch(e){}}
    // Restore last viewed class
    const lastGrade=parseInt(localStorage.getItem('lastGrade'));
    const nextGrade=accessibleGrades.includes(lastGrade)?lastGrade:accessibleGrades[0];
    window.APP_CURRENT_GRADE=nextGrade;setCurrentGrade(nextGrade);
    const lastCls=parseInt(localStorage.getItem('lastCls'));
    setCurrentCls(accessibleClasses.includes(lastCls)?lastCls:accessibleClasses[0]);
  },[profile?.role,profile?.grade,JSON.stringify(profile?.classes||[])]);

  useEffect(()=>{
    if(!currentGrade||!currentCls)return;
    if(!accessibleClasses.includes(currentCls)){setCurrentCls(accessibleClasses[0]);return;}
    window.APP_CURRENT_GRADE=currentGrade;localStorage.setItem('lastGrade',String(currentGrade));localStorage.setItem('lastCls',String(currentCls));
    setLoading(true);setStudents([]);setSearch('');
    const unsub=clsRef(currentCls,currentGrade).collection('students').orderBy('no').onSnapshot(async snap=>{
      if(snap.empty){
        // 1) 기존 teachers/{uid}/students 경로에서 이전 데이터 찾기
        const prefix=`${currentGrade}${String(currentCls).padStart(2,'0')}`;
        const oldSnap=await db.collection('teachers').doc(user.uid).collection('students')
          .orderBy('studentNumber').startAt(prefix+'00').endAt(prefix+'99').get();
        if(!oldSnap.empty){
          // 기존 데이터 → 새 경로로 이전
          const batch=db.batch();
          oldSnap.docs.forEach(doc=>batch.set(clsRef(currentCls,currentGrade).collection('students').doc(doc.id),doc.data()));
          await batch.commit();
        }else{
          // 아예 없으면 기본 학생 명단으로 시딩
          const seed=getStudentSeed(currentGrade,currentCls);
          if(seed){const batch=db.batch();seed.students.forEach(s=>{batch.set(clsRef(currentCls,currentGrade).collection('students').doc(s.studentNumber),{...defStudent(s),createdAt:firebase.firestore.FieldValue.serverTimestamp()});});await batch.commit();}
        }
      }else{
        const docs=snap.docs.map(d=>({id:d.id,...d.data()}));
        const seed=getStudentSeed(currentGrade,currentCls);
        if(seed){
          const existing=new Set(docs.map(s=>s.studentNumber));
          const missing=seed.students.filter(s=>!existing.has(s.studentNumber));
          if(missing.length>0){
            const batch=db.batch();
            missing.forEach(s=>batch.set(clsRef(currentCls,currentGrade).collection('students').doc(s.studentNumber),{...defStudent(s),createdAt:firebase.firestore.FieldValue.serverTimestamp()}));
            await batch.commit();
            return;
          }
        }
        setStudents(docs);setLoading(false);
      }
    },err=>{console.error(err);setLoading(false);});
    return()=>unsub();
  },[currentGrade,currentCls]);

  const saveStudent=async s=>{
    const{id,...data}=s;
    await clsRef(currentCls,currentGrade).collection('students').doc(s.studentNumber).set({...data,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
    setStudents(prev=>prev.map(st=>st.studentNumber===s.studentNumber?{...st,...data}:st));};

  const printAllAccounts=async()=>{
    const withAcct=students.filter(s=>s.authUid&&s.authUid!=='exists');
    if(withAcct.length===0){alert('계정이 있는 학생이 없습니다.');return;}
    const docs=await Promise.all(withAcct.map(s=>db.collection('studentAccounts').doc(s.studentNumber).get()));
    const cards=withAcct.map((s,i)=>({...s,pw:docs[i].exists?docs[i].data().password:'—'}));
    openPrintWindow(cards,currentCls,currentGrade);};

  const resetAuthUids=async()=>{
    if(!window.confirm('authUid를 초기화하시겠습니까?\n(Firebase Auth 계정 삭제 후 사용하세요)'))return;
    const batch=db.batch();
    students.forEach(s=>{batch.update(clsRef(currentCls,currentGrade).collection('students').doc(s.studentNumber),{authUid:firebase.firestore.FieldValue.delete()});});
    await batch.commit();alert('초기화 완료!');};

  if(selected){
    const live=students.find(s=>s.studentNumber===selected.studentNumber)||selected;
    return<StudentDetail student={live} onSave={saveStudent} onBack={()=>setSelected(null)} cls={currentCls} grade={currentGrade} isTeacher={true}/>;
  }

  const filtered=students.filter(s=>{
    const q=search.trim();
    if(q&&!s.name?.includes(q)&&!s.studentNumber?.includes(q))return false;
    if(filter==='완료')return!!s.completed;if(filter==='미완료')return!s.completed;
    if(filter==='계정있음')return!!s.authUid;if(filter==='계정없음')return!s.authUid;
    return true;});
  const done=students.filter(s=>s.completed).length;
  const pct=students.length>0?Math.round(done/students.length*100):0;
  const withAcct=students.filter(s=>s.authUid).length;

  return(<div style={{minHeight:'100vh',background:'var(--gray-50)'}}>
    <div className="header"><div style={{maxWidth:1600,margin:'0 auto'}}>
      <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:10}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <h1 style={{fontSize:16,fontWeight:700}}>🎓 수시·정시 상담 관리 <span style={{fontSize:11,opacity:.7}}>선생님</span></h1>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'nowrap'}}>
          <span style={{fontSize:12,fontWeight:700,background:'rgba(255,255,255,.18)',border:'1px solid rgba(255,255,255,.25)',padding:'5px 10px',borderRadius:6,whiteSpace:'nowrap'}}>{teacherName}</span>
          {!profile?.isGoogleAdmin&&<button onClick={()=>setPwModal(true)} style={{background:'rgba(255,255,255,.2)',color:'white',padding:'5px 12px',fontSize:12,whiteSpace:'nowrap',flex:1,textAlign:'center'}}>비밀번호 변경</button>}
          <button onClick={onLogout} style={{background:'rgba(255,255,255,.2)',color:'white',padding:'5px 12px',fontSize:12,whiteSpace:'nowrap',flex:1,textAlign:'center'}}>로그아웃</button>
        </div>
      </div>
      {/* 반 선택 탭 */}
      <div className="cls-tabs">
        {(profile?.role==='admin'||profile?.isGoogleAdmin)&&accessibleGrades.map(g=>(
          <button key={g} className={`cls-tab ${currentGrade===g?'active':''}`} onClick={()=>{setCurrentGrade(g);window.APP_CURRENT_GRADE=g;}}>
            {g}학년
          </button>))}
        {accessibleClasses.map(n=>(
          <button key={n} className={`cls-tab ${currentCls===n?'active':''}`} onClick={()=>setCurrentCls(n)}>
            {n}반
          </button>))}
      </div>
    </div></div>

    <div className="toolbar">
      <div style={{fontSize:13,fontWeight:600,color:'var(--gray-700)'}}>
        {gradeLabel(currentGrade)} {currentCls}반 · {students.length}명
        <span style={{fontSize:12,fontWeight:400,color:'var(--gray-400)',marginLeft:8}}>완료 {done}명 ({pct}%) · 계정 {withAcct}명</span>
      </div>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 이름 또는 학번" style={{width:180}}/>
      <div style={{display:'flex',gap:4}}>
        {['전체','완료','미완료','계정있음','계정없음'].map(f=><button key={f} className={`tab ${filter===f?'active':''}`} onClick={()=>setFilter(f)}>{f}</button>)}
      </div>
      <div style={{display:'flex',gap:5,flexWrap:'wrap',width:'100%',marginTop:4}}>
        {(profile?.role==='admin'||profile?.isGoogleAdmin)&&<button onClick={()=>setTeacherAcctModal(true)} style={{background:'#4f46e5',color:'white',fontWeight:700,padding:'7px 12px',fontSize:12,borderRadius:6}}>선생님 계정</button>}
        <button onClick={()=>setScheduleModal(true)} style={{background:'#0369a1',color:'white',fontWeight:600,padding:'7px 12px',fontSize:12,borderRadius:6}}>📅 상담 일정</button>
        <button onClick={printAllAccounts} style={{background:'#0f766e',color:'white',fontWeight:600,padding:'7px 12px',fontSize:12,borderRadius:6}}>🖨️ 계정카드 인쇄</button>
        <button onClick={()=>setBulkModal(true)} style={{background:'#7c3aed',color:'white',fontWeight:700,padding:'7px 14px',fontSize:12,borderRadius:6}}>🔑 계정 생성 ({students.filter(s=>!s.authUid).length}명)</button>
        <details style={{display:'inline'}}><summary style={{background:'var(--gray-200)',color:'var(--gray-500)',padding:'7px 10px',fontSize:11,borderRadius:6,cursor:'pointer',listStyle:'none'}}>⚙</summary>
          <div style={{position:'absolute',right:24,background:'white',border:'1px solid var(--gray-200)',borderRadius:8,padding:8,boxShadow:'0 4px 12px rgba(0,0,0,.1)',zIndex:100}}>
            <button onClick={resetAuthUids} style={{background:'#fef2f2',color:'#dc2626',fontWeight:600,padding:'8px 14px',fontSize:12,borderRadius:6,width:'100%'}}>🔄 authUid 초기화 (Auth 계정 삭제 후 사용)</button>
          </div>
        </details>
      </div>
    </div>

    {loading?(<div className="empty-state"><div style={{fontSize:32,marginBottom:8}}>⏳</div>불러오는 중...</div>)
    :(<div className="student-grid">{filtered.map(s=>{
      const sc=(s.susiList||[]).filter(e=>e.univ).length;
      return(<div key={s.studentNumber} className={`student-card ${s.completed?'completed':''}`} onClick={()=>setSelected(s)}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
          <div><span style={{fontSize:11,color:'var(--gray-400)',display:'block'}}>{s.no}번 · {s.studentNumber}{s.note?<span style={{color:'var(--warning)',marginLeft:4}}>{s.note}</span>:''}</span><span style={{fontSize:15,fontWeight:700}}>{s.name}</span></div>
          <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:2}}>
            {s.completed&&<span className="badge badge-green">완료</span>}
            {s.authUid?<span className="badge badge-blue">계정✓</span>:<span className="badge badge-gray">계정없음</span>}
          </div>
        </div>
        {s.grades?.jeonGwaGyo?(
          <div style={{display:'flex',gap:3,marginBottom:6}}>
            {[['전교',s.grades?.jeonGwaGyo],['국수영사',s.grades?.guksuYeongSa],['수시',sc+'개']].map(([l,v],i)=>(
              <div key={l} style={{flex:1,background:'var(--gray-50)',borderRadius:4,padding:'3px 0',textAlign:'center'}}>
                <div style={{fontSize:10,color:'var(--gray-400)'}}>{l}</div>
                <div style={{fontSize:13,fontWeight:700,color:i===2?'#8b5cf6':'var(--primary)'}}>{v||'-'}</div>
              </div>))}
          </div>):(<div style={{fontSize:11,color:'var(--gray-300)',marginBottom:6,padding:'5px',textAlign:'center',background:'var(--gray-50)',borderRadius:4}}>성적 미입력</div>)}
        {s.counselingDate&&<p style={{fontSize:10,color:'var(--gray-400)',marginBottom:4}}>📅 {s.counselingDate}</p>}
        {s.authUid&&<button onClick={e=>{e.stopPropagation();setAcctModal(s);}} style={{width:'100%',padding:'4px',background:'#ede9fe',color:'#6d28d9',fontWeight:600,fontSize:11,borderRadius:5,marginTop:4}}>🔑 계정보기 / 비번확인</button>}
      </div>);})}
    </div>)}

    {bulkModal&&<BulkAccountModal students={students} cls={currentCls} grade={currentGrade} projectId={projectId} onClose={()=>setBulkModal(false)}/>}
    {acctModal&&<AccountInfoModal student={acctModal} projectId={projectId} onClose={()=>setAcctModal(null)}/>}
    {pwModal&&<PasswordChangeModal user={user} onClose={()=>setPwModal(false)}/>}
    {teacherAcctModal&&<TeacherAccountModal grade={currentGrade} projectId={projectId} onClose={()=>setTeacherAcctModal(false)}/>}
    {scheduleModal&&<ScheduleModal cls={currentCls} grade={currentGrade} onClose={()=>setScheduleModal(false)}/>}
  </div>);}

/* ── Student Dashboard ── */
function StudentDashboard({user,onLogout}){
  const [studentDoc,setStudentDoc]=useState(null);const [cls,setCls]=useState(null);const [grade,setGrade]=useState(null);const [loading,setLoading]=useState(true);
  const [pwModal,setPwModal]=useState(false);
  useEffect(()=>{
    const find=async()=>{
      const snap=await db.collection('studentAccounts').where('uid','==',user.uid).limit(1).get();
      if(snap.empty){setLoading(false);return;}
      const acct=snap.docs[0].data();const g=acct.grade||gradeFromNumber(acct.studentNumber||snap.docs[0].id);window.APP_CURRENT_GRADE=g;setGrade(g);setCls(acct.cls);
      const sSnap=await clsRef(acct.cls,g).collection('students').where('authUid','==',user.uid).limit(1).get();
      if(!sSnap.empty)setStudentDoc({id:sSnap.docs[0].id,...sSnap.docs[0].data()});
      setLoading(false);};
    find();
  },[user.uid]);
  const saveStudent=async s=>{
    if(!cls)return;
    await clsRef(cls,grade).collection('students').doc(s.studentNumber).set({...s,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
    setStudentDoc(s);};
  if(loading)return<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--gray-400)'}}>로딩 중...</div>;
  if(!studentDoc)return(<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}><div style={{textAlign:'center',color:'var(--gray-500)'}}><div style={{fontSize:48,marginBottom:12}}>😅</div><p style={{fontSize:16,fontWeight:600,marginBottom:8}}>학생 정보를 찾을 수 없습니다</p><p style={{fontSize:13,marginBottom:20}}>선생님께 계정 연결을 요청하세요</p><button onClick={onLogout} className="btn-ghost">로그아웃</button></div></div>);
  return(<div style={{minHeight:'100vh',background:'var(--gray-50)'}}>
    <div style={{background:'linear-gradient(135deg,#f59e0b,#f97316)',color:'white',padding:'12px 20px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <div><span style={{fontSize:16,fontWeight:700}}>📚 내 수시·정시 상담표</span><span style={{fontSize:12,opacity:.85,marginLeft:10}}>{gradeLabel(grade)} {cls}반</span></div>
      <div style={{display:'flex',alignItems:'center',gap:10}}><span style={{fontSize:12,opacity:.85}}>{studentDoc.name} ({studentDoc.studentNumber})</span><button onClick={()=>setPwModal(true)} style={{background:'rgba(255,255,255,.2)',color:'white',padding:'5px 12px',fontSize:12,borderRadius:5}}>비밀번호 변경</button><button onClick={onLogout} style={{background:'rgba(255,255,255,.2)',color:'white',padding:'5px 12px',fontSize:12,borderRadius:5}}>로그아웃</button></div>
    </div>
    <StudentDetail student={studentDoc} onSave={saveStudent} onBack={()=>{}} cls={cls} grade={grade} isTeacher={false}/>
    {pwModal&&<PasswordChangeModal user={user} onClose={()=>setPwModal(false)}/>}
  </div>);}

/* ── App Root ── */
function App(){
  const [screen,setScreen]=useState('loading');const [user,setUser]=useState(null);const [role,setRole]=useState(null);const [projectId,setProjectId]=useState('');const [teacherProfile,setTeacherProfile]=useState(null);
  const resolveUser=async u=>{
    if(!u){setUser(null);setRole(null);setTeacherProfile(null);setScreen('login');return;}
    const isGoogle=u.providerData.some(p=>p.providerId==='google.com');
    if(isGoogle){
      if(!isAdminEmail(u.email)){await auth.signOut();alert('관리자 계정으로만 로그인할 수 있습니다.');return;}
      setTeacherProfile(googleTeacherProfile(u));setRole('teacher');setUser(u);setScreen('app');return;
    }
    const tNum=teacherNumberFromUser(u);
    if(tNum){
      let doc=await db.collection('teachers').doc(tNum).get();
      if(!doc.exists)doc=await db.collection('teachers').doc(u.uid).get();
      if(!doc.exists){
        const byUid=await db.collection('teachers').where('uid','==',u.uid).limit(1).get();
        if(!byUid.empty)doc=byUid.docs[0];
      }
      if(doc.exists){
        const grade=gradeFromNumber(tNum);const cls=parseInt(tNum.slice(1,3),10);
        setTeacherProfile({...doc.data(),teacherNumber:tNum,grade,role:'teacher',classes:[cls],cls});
        setRole('teacher');setUser(u);setScreen('app');return;
      }
      await auth.signOut();alert('선생님 계정 정보가 없습니다. 관리자에게 계정 생성을 요청하세요.');return;
    }
    setTeacherProfile(null);setRole('student');setUser(u);setScreen('app');
  };
  useEffect(()=>{
    const cfg={"apiKey":"AIzaSyBYHjmTrzCMeyoisRwCh21ExtcyDt0JoVw","authDomain":"cons-cfa95.firebaseapp.com","projectId":"cons-cfa95","storageBucket":"cons-cfa95.firebasestorage.app","messagingSenderId":"814071622450","appId":"1:814071622450:web:583f037cc07f4999ee852b"};
    try{
      initFirebase(cfg);setProjectId(cfg.projectId);
      localStorage.setItem('fbConfig',JSON.stringify(cfg));
      const authFallback=setTimeout(()=>setScreen(s=>s==='loading'?'login':s),5000);
      const unsub=auth.onAuthStateChanged(u=>{
        clearTimeout(authFallback);
        resolveUser(u).catch(e=>{console.error(e);setUser(null);setRole(null);setTeacherProfile(null);setScreen('login');});
      });
      return()=>{clearTimeout(authFallback);unsub();};
    }catch(e){console.error('Firebase 오류:',e);setScreen('config');}
  },[]);
  const handleConfig=cfg=>{initFirebase(cfg);setProjectId(cfg.projectId);auth.onAuthStateChanged(u=>{resolveUser(u).catch(e=>{console.error(e);setScreen('login');});});};
  const handleLogout=()=>{auth.signOut();setScreen('login');setUser(null);setRole(null);setTeacherProfile(null);};
  if(screen==='loading')return<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--gray-400)'}}>🎓 로딩 중...</div>;
  if(screen==='config')return<ConfigScreen onSave={handleConfig}/>;
  if(screen==='login')return<LoginScreen projectId={projectId}/>;
  if(screen==='app'&&role==='teacher')return<TeacherDashboard user={user} onLogout={handleLogout} profile={teacherProfile}/>;
  if(screen==='app'&&role==='student')return<StudentDashboard user={user} onLogout={handleLogout}/>;
  return null;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
